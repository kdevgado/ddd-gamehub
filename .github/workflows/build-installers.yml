name: Build installable apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - name: Check out the app
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run desktop:installer

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: DDD-Game-Hub-Windows
          path: release/windows/*.exe
          if-no-files-found: error

  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Check out the app
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: npm run android:apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: DDD-Game-Hub-Android
          path: release/android/*.apk
          if-no-files-found: error

  release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - windows
      - android
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --generate-notes --title "DDD Game Hub $GITHUB_REF_NAME"
